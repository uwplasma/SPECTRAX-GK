# Bounded runtime-config example for independent ky scan workers.
# [parallel] strategy="batch" dispatches one normal runtime solve per ky value
# through the independent worker pool. It does not change solver defaults or use
# the combined-ky solver layout.

[grid]
Nx = 1
Ny = 4
Nz = 8
Lx = 6.0
Ly = 6.0

[time]
t_max = 0.3
dt = 0.1
method = "rk2"
use_diffrax = false
sample_stride = 1
progress_bar = false

[scan]
ky = [0.1, 0.2, 0.3]
Nl = 2
Nm = 3
solver = "time"
method = "rk2"
steps = 3
sample_stride = 1

[fit]
auto_window = true
window_fraction = 0.5
min_points = 2
start_fraction = 0.0
growth_weight = 0.0
require_positive = false
min_amp_fraction = 0.0
mode_method = "project"
fit_signal = "phi"

[parallel]
strategy = "batch"
axis = "ky"
num_devices = 2
backend = "thread"
