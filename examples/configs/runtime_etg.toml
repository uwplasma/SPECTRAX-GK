[[species]]
name = "electron"
charge = -1.0
mass = 0.00027248
density = 1.0
temperature = 1.0
tprim = 2.49
fprim = 0.8
nu = 0.0
kinetic = true

[grid]
Nx = 1
Ny = 24
Nz = 96
Lx = 6.28
Ly = 6.28
boundary = "linked"
y0 = 0.2
ntheta = 32
nperiod = 2

[time]
t_max = 6.0
dt = 0.01
method = "imex2"
use_diffrax = false
sample_stride = 2

[geometry]
q = 1.4
s_hat = 0.8
epsilon = 0.18
R0 = 2.77778

[init]
init_field = "density"
init_amp = 1e-10
gaussian_init = true
gaussian_width = 0.5

[physics]
linear = true
nonlinear = false
electrostatic = true
electromagnetic = false
adiabatic_electrons = false
adiabatic_ions = true
tau_e = 1.0
collisions = true
hypercollisions = true

[collisions]
nu_hermite = 1.0
nu_laguerre = 2.0
nu_hyper = 0.0
p_hyper = 4.0
hypercollisions_const = 1.0
hypercollisions_kz = 0.0
damp_ends_amp = 0.0
damp_ends_widthfrac = 0.0

[normalization]
contract = "etg"
diagnostic_norm = "none"

[terms]
streaming = 1.0
mirror = 1.0
curvature = 1.0
gradb = 1.0
diamagnetic = 1.0
collisions = 1.0
hypercollisions = 1.0
end_damping = 1.0
apar = 0.0
bpar = 0.0
nonlinear = 0.0

[run]
ky = 15.0
Nl = 24
Nm = 8
solver = "krylov"

[scan]
ky = [5.0, 10.0, 15.0, 20.0, 25.0, 30.0]
