# VMEC-backed stellarator linear quasilinear transport diagnostic example.
# Generate the self-contained QI equilibrium with:
#   cd examples/vmec && vmex input.nfp3_QI_fixed_resolution_final
# For exact W7-X validation, override geometry.vmec_file with the benchmark
# W7-X wout. The runtime generates/reuses the VMEC-derived eik cache.
# The uncalibrated mixing-length output is a model diagnostic and must be
# compared against nonlinear windows before making absolute-flux claims.

[[species]]
name = "ion"
charge = 1.0
mass = 1.0
density = 1.0
temperature = 1.0
tprim = 3.0
fprim = 1.0
nu = 0.01
kinetic = true

[grid]
Nx = 96
Ny = 96
Nz = 48
Lx = 62.8
Ly = 62.8
boundary = "fix aspect"
y0 = 21.0
ntheta = 48
nperiod = 1

[time]
t_max = 2.0
dt = 0.005
method = "rk4"
use_diffrax = false
sample_stride = 1
fixed_dt = true

[geometry]
model = "vmec"
vmec_file = "../../vmec/wout_nfp3_QI_fixed_resolution_final.nc"
torflux = 0.64
alpha = 0.0
npol = 1.0

[init]
init_field = "density"
init_amp = 1e-3
gaussian_init = false

[physics]
linear = true
nonlinear = false
electrostatic = true
electromagnetic = false
adiabatic_electrons = true
adiabatic_ions = false
tau_e = 1.0
collisions = true
hypercollisions = true

[collisions]
nu_hermite = 1.0
nu_laguerre = 2.0
nu_hyper = 0.0
p_hyper = 4.0
hypercollisions_const = 0.0
hypercollisions_kz = 1.0
D_hyper = 0.05
damp_ends_amp = 0.1
damp_ends_widthfrac = 0.125

[normalization]
contract = "kinetic"
diagnostic_norm = "none"
flux_scale = 1.0

[terms]
streaming = 1.0
mirror = 1.0
curvature = 1.0
gradb = 1.0
diamagnetic = 1.0
collisions = 1.0
hypercollisions = 1.0
hyperdiffusion = 1.0
end_damping = 1.0
apar = 0.0
bpar = 0.0
nonlinear = 0.0

[output]
path = "tools_out/w7x_quasilinear"

[quasilinear]
enabled = true
mode = "saturated"
saturation_rule = "mixing_length"
amplitude_normalization = "phi_rms"
kperp_average = "phi_weighted"
csat = 1.0
gamma_floor = 0.0
include_stable_modes = false
channels = ["es"]
write_spectrum = true

[run]
ky = 0.047619047619047616
Nl = 4
Nm = 8
solver = "time"
