[[species]]
name = "ion"
charge = 1.0
mass = 1.0
density = 1.0
temperature = 1.0
tprim = 3.0
fprim = 1.0
nu = 0.0
kinetic = true

[grid]
Nx = 1
Ny = 82
Nz = 256
Lx = 62.8
Ly = 62.8
boundary = "linked"
y0 = 10.0

[time]
t_max = 2.0
dt = 0.005890226417991923
method = "rk4"
use_diffrax = false
sample_stride = 1
fixed_dt = false

[geometry]
model = "gx-netcdf"
geometry_file = "/path/to/itg_w7x_adiabatic_electrons.eik.nc"

[init]
init_field = "phi"
init_amp = 1e-10
gaussian_init = true
gaussian_width = 0.5

[physics]
linear = true
nonlinear = false
electrostatic = true
electromagnetic = false
adiabatic_electrons = true
adiabatic_ions = false
tau_e = 1.0
collisions = true
hypercollisions = true

[collisions]
nu_hermite = 1.0
nu_laguerre = 2.0
nu_hyper = 0.0
p_hyper = 4.0
hypercollisions_const = 0.0
hypercollisions_kz = 1.0
damp_ends_amp = 0.1
damp_ends_widthfrac = 0.125

[normalization]
contract = "kinetic"
diagnostic_norm = "gx"

[terms]
streaming = 1.0
mirror = 1.0
curvature = 1.0
gradb = 1.0
diamagnetic = 1.0
collisions = 1.0
hypercollisions = 1.0
end_damping = 1.0
apar = 0.0
bpar = 0.0
nonlinear = 0.0

[run]
ky = 0.3
Nl = 12
Nm = 32
solver = "gx_time"
