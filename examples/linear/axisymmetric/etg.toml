case = "etg"

[grid]
Nx = 1
Ny = 24
Nz = 96
Lx = 6.28
Ly = 6.28
boundary = "linked"
y0 = 0.2
ntheta = 32
nperiod = 2

[time]
t_max = 10.0
dt = 0.05
use_diffrax = true
diffrax_solver = "Dopri8"
diffrax_adaptive = true
diffrax_rtol = 1.0e-5
diffrax_atol = 1.0e-7
diffrax_max_steps = 200000

[run]
ky = 25.0
Nl = 48
Nm = 16
solver = "krylov"

[scan]
ky = [5.0, 15.0, 25.0, 35.0]
Nl = 48
Nm = 16
solver = "krylov"

[krylov]
method = "propagator"
krylov_dim = 16
restarts = 1
omega_min_factor = 0.0
omega_cap_factor = 0.5
omega_target_factor = 0.5
omega_sign = -1
power_iters = 80
power_dt = 0.002

[fit]
auto_window = true
window_fraction = 0.25
start_fraction = 0.45
min_points = 100
min_amp_fraction = 0.2
fit_signal = "phi"
