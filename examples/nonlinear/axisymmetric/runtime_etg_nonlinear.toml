# Full-GK nonlinear ETG pilot lane.
# This is the shipped full-GK ETG nonlinear pilot contract.
# The matched GX startup path is Gaussian, not single-mode:
# in GX the `init_single` toggle lives under `[Expert]`, so keeping
# `gaussian_init = true` and `init_single = false` here reproduces the
# audited GX pilot startup state.
# For parity-sensitive reproduction, prefer:
#   JAX_ENABLE_X64=1 spectrax-gk examples/nonlinear/axisymmetric/runtime_etg_nonlinear.toml
# For faster exploratory runs, leave JAX_ENABLE_X64 unset.

[[species]]
name = "ion"
charge = 1.0
mass = 1.0
density = 1.0
temperature = 1.0
tprim = 0.0
fprim = 0.0
nu = 0.0
kinetic = true

[[species]]
name = "electron"
charge = -1.0
mass = 0.00027
density = 1.0
temperature = 1.0
tprim = 2.49
fprim = 0.8
nu = 0.0
kinetic = true

[grid]
Nx = 24
Ny = 24
Nz = 48
Lx = 1.25
Ly = 6.28
boundary = "linked"
y0 = 0.2
ntheta = 32
nperiod = 2

[time]
t_max = 0.5
dt = 0.001
method = "rk4"
sample_stride = 5
diagnostics_stride = 5
use_diffrax = false
gx_real_fft = true
laguerre_nonlinear_mode = "grid"
fixed_dt = true

[geometry]
q = 1.4
s_hat = 0.8
epsilon = 0.18
R0 = 2.77778

[init]
init_field = "density"
init_amp = 1.0e-10
gaussian_init = true
gaussian_width = 0.5
init_single = false
init_electrons_only = true

[physics]
linear = false
nonlinear = true
electrostatic = true
electromagnetic = false
adiabatic_electrons = false
adiabatic_ions = false
tau_e = 1.0
collisions = true
hypercollisions = true

[collisions]
nu_hermite = 1.0
nu_laguerre = 2.0
nu_hyper = 0.0
p_hyper = 4.0
hypercollisions_const = 0.0
hypercollisions_kz = 1.0
damp_ends_amp = 0.0
damp_ends_widthfrac = 0.0

[normalization]
contract = "etg"
diagnostic_norm = "gx"

[terms]
streaming = 1.0
mirror = 1.0
curvature = 1.0
gradb = 1.0
diamagnetic = 1.0
collisions = 1.0
hypercollisions = 1.0
hyperdiffusion = 0.0
end_damping = 1.0
apar = 0.0
bpar = 0.0
nonlinear = 1.0

[run]
ky = 5.0
Nl = 16
Nm = 8
steps = 500

[output]
path = "../../../tools_out/etg_nonlinear_runtime"
