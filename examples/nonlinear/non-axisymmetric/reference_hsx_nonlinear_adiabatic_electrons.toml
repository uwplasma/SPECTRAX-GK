# Reference nonlinear adiabatic-electron ITG case on HSX.
# This config matches the parameters used in established HSX benchmarks.

debug = false

[Dimensions]
ntheta = 48
nperiod = 1
ny = 96
nx = 96
nhermite = 8
nlaguerre = 4
nspecies = 1

[Domain]
y0 = 21.0
boundary = "fix aspect"

[Physics]
beta = 0.0
nonlinear_mode = true

[Time]
t_max = 200.0
dt = 0.1
cfl = 1.0
scheme = "rk3"

[Initialization]
ikpar_init = 0
init_field = "density"
init_amp = 1.0e-3

[Geometry]
geo_option = "vmec"
vmec_file = "wout_HSX_QHS_vac.nc"
alpha = 0.0
npol = 1.0
desired_normalized_toroidal_flux = 0.64

[species]
z     = [ 1.0,      -1.0     ]
mass  = [ 1.0,       2.7e-4  ]
dens  = [ 1.0,       1.0     ]
temp  = [ 1.0,       1.0     ]
tprim = [ 3.0,       0.0     ]
fprim = [ 1.0,       0.0     ]
vnewk = [ 0.01,      0.0     ]
type  = [ "ion",  "electron" ]

[Boltzmann]
add_Boltzmann_species = true
Boltzmann_type = "electrons"
tau_fac = 1.0

[Dissipation]
closure_model = "none"
hypercollisions = true
hyper = true
D_hyper = 0.05

[Restart]
restart = false
save_for_restart = true

[Diagnostics]
nwrite = 50
free_energy = true
fluxes = true
fields = true
moments = true
