name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mypy:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Print benchmark stack
        run: |
          python - <<'PY'
          import diffrax, equinox, jax, jaxlib, numpy
          print("jax", jax.__version__)
          print("jaxlib", jaxlib.__version__)
          print("numpy", numpy.__version__)
          print("diffrax", diffrax.__version__)
          print("equinox", equinox.__version__)
          PY

      - name: MyPy (types)
        run: |
          mypy --version
          mypy

  quick-tests:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: fundamentals
            files: >-
              tests/test_analysis.py
              tests/test_auto_fit_signal.py
              tests/test_basis.py
              tests/test_config.py
              tests/test_geometry.py
              tests/test_grids.py
              tests/test_gyroaverage.py
              tests/test_normalization.py
              tests/test_operators.py
              tests/test_plotting.py
              tests/test_species.py
              tests/test_io.py
          - name: linear-core
            files: >-
              tests/test_linear.py
              tests/test_full_operator.py
              tests/test_terms_assembly.py
              tests/test_terms_fields.py
              tests/test_terms_integrators.py
              tests/test_terms_operators.py
              tests/test_terms_validation.py
              tests/test_linear_krylov_core.py
          - name: runtime-nonlinear
            files: >-
              tests/test_diffrax_integrators.py
              tests/test_diffrax_integrators_core.py
              tests/test_nonlinear.py
              tests/test_nonlinear_exb.py
              tests/test_hyperdiffusion.py
              tests/test_runtime_config.py
              tests/test_runtime_helpers.py
              tests/test_runtime_runner.py
              tests/test_runners.py
              tests/test_cli.py
              tests/test_gx_consistency.py
              tests/test_gx_diagnostics.py
              tests/test_example_smoke.py

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Print benchmark stack
        run: |
          python - <<'PY'
          import diffrax, equinox, jax, jaxlib, numpy
          print("jax", jax.__version__)
          print("jaxlib", jaxlib.__version__)
          print("numpy", numpy.__version__)
          print("diffrax", diffrax.__version__)
          print("equinox", equinox.__version__)
          PY

      - name: Pytest shard (${{ matrix.shard.name }})
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q --maxfail=1 --disable-warnings ${{ matrix.shard.files }}

  fast-coverage:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Release-surface coverage (>=95%)
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q \
            tests/test_cli.py \
            tests/test_plotting.py \
            tests/test_runtime_artifacts.py \
            tests/test_secondary.py \
            tests/test_analysis.py \
            --maxfail=1 --disable-warnings \
            --cov=spectraxgk \
            --cov-report=xml:coverage-fast.xml \
            --cov-report=term
          python - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          thresholds = {
              "cli.py": 95.0,
              "plotting.py": 95.0,
              "runtime_artifacts.py": 95.0,
              "secondary.py": 95.0,
              "analysis.py": 95.0,
          }

          root = ET.parse("coverage-fast.xml").getroot()
          found = {}
          for cls in root.findall(".//class"):
              filename = cls.attrib.get("filename", "")
              for target in thresholds:
                  if filename.endswith(target):
                      found[target] = float(cls.attrib["line-rate"]) * 100.0

          missing = [name for name in thresholds if name not in found]
          if missing:
              print(f"Missing coverage entries for: {missing}")
              sys.exit(1)

          failed = []
          for target, threshold in thresholds.items():
              cov = found[target]
              print(f"{target}: {cov:.2f}% (required {threshold:.1f}%)")
              if cov < threshold:
                  failed.append((target, cov, threshold))

          if failed:
              for target, cov, threshold in failed:
                  print(f"FAIL: {target}={cov:.2f}% < {threshold:.1f}%")
              sys.exit(1)
          PY

      - name: Upload fast coverage report
        uses: codecov/codecov-action@v5
        with:
          files: coverage-fast.xml
          flags: fast-surface
          fail_ci_if_error: true
          use_oidc: true

  wide-coverage:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wide package coverage
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q --maxfail=1 --disable-warnings \
            --cov=spectraxgk \
            --cov-report=xml:coverage-wide.xml \
            --cov-report=term

      - name: Upload wide coverage report
        uses: codecov/codecov-action@v5
        with:
          files: coverage-wide.xml
          flags: wide-package
          fail_ci_if_error: true
          use_oidc: true

  docs-and-packaging:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install docs + release deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build docs
        run: |
          python tools/check_validation_coverage_manifest.py --out-json docs/_static/validation_coverage_manifest_summary.json
          python -m sphinx -W -b html docs docs/_build/html

      - name: Build distribution artifacts
        run: |
          python -m build

      - name: Check distribution metadata
        run: |
          twine check dist/*

  nightly-full:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Print benchmark stack
        run: |
          python - <<'PY'
          import diffrax, equinox, jax, jaxlib, numpy
          print("jax", jax.__version__)
          print("jaxlib", jaxlib.__version__)
          print("numpy", numpy.__version__)
          print("diffrax", diffrax.__version__)
          print("equinox", equinox.__version__)
          PY

      - name: MyPy (types)
        run: |
          mypy --version
          mypy

      - name: Pytest (full suite)
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q --maxfail=1 --disable-warnings

      - name: Core Terms Coverage (>=90%)
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q \
            tests/test_terms_assembly.py \
            tests/test_terms_operators.py \
            tests/test_terms_fields.py \
            tests/test_terms_integrators.py \
            tests/test_terms_validation.py \
            tests/test_nonlinear_exb.py \
            tests/test_nonlinear.py \
            --maxfail=1 --disable-warnings \
            --cov=src/spectraxgk/terms \
            --cov-fail-under=90

      - name: Krylov + Diffrax Core Coverage (>=90% each)
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q \
            tests/test_linear_krylov_core.py \
            tests/test_diffrax_integrators.py \
            tests/test_diffrax_integrators_core.py \
            --maxfail=1 --disable-warnings \
            --cov=src/spectraxgk \
            --cov-report=xml:coverage-core.xml \
            --cov-report=term
          python - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          thresholds = {
              "linear_krylov.py": 90.0,
              "diffrax_integrators.py": 90.0,
          }

          root = ET.parse("coverage-core.xml").getroot()
          found = {}
          for cls in root.findall(".//class"):
              filename = cls.attrib.get("filename", "")
              for target in thresholds:
                  if filename.endswith(target):
                      found[target] = float(cls.attrib["line-rate"]) * 100.0

          missing = [name for name in thresholds if name not in found]
          if missing:
              print(f"Missing coverage entries for: {missing}")
              sys.exit(1)

          failed = []
          for target, threshold in thresholds.items():
              cov = found[target]
              print(f"{target}: {cov:.2f}% (required {threshold:.1f}%)")
              if cov < threshold:
                  failed.append((target, cov, threshold))

          if failed:
              for target, cov, threshold in failed:
                  print(f"FAIL: {target}={cov:.2f}% < {threshold:.1f}%")
              sys.exit(1)
          PY
