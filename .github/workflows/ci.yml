name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  type-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install build + runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: MyPy (types)
        run: |
          mypy --version
          mypy

      - name: Pytest
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q --maxfail=1 --disable-warnings

      - name: Core Terms Coverage (>=90%)
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q \
            tests/test_terms_assembly.py \
            tests/test_terms_operators.py \
            tests/test_terms_fields.py \
            tests/test_terms_integrators.py \
            tests/test_terms_validation.py \
            --maxfail=1 --disable-warnings \
            --cov=src/spectraxgk/terms \
            --cov-fail-under=90

      - name: Krylov + Diffrax Core Coverage (>=90% each)
        env:
          MPLBACKEND: Agg
          JAX_ENABLE_X64: "true"
          SPECTRAX_X64: "1"
        run: |
          pytest -q \
            tests/test_linear_krylov_core.py \
            tests/test_diffrax_integrators.py \
            tests/test_diffrax_integrators_core.py \
            --maxfail=1 --disable-warnings \
            --cov=src/spectraxgk \
            --cov-report=xml:coverage-core.xml \
            --cov-report=term
          python - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          thresholds = {
              "linear_krylov.py": 90.0,
              "diffrax_integrators.py": 90.0,
          }

          root = ET.parse("coverage-core.xml").getroot()
          found = {}
          for cls in root.findall(".//class"):
              filename = cls.attrib.get("filename", "")
              for target in thresholds:
                  if filename.endswith(target):
                      found[target] = float(cls.attrib["line-rate"]) * 100.0

          missing = [name for name in thresholds if name not in found]
          if missing:
              print(f"Missing coverage entries for: {missing}")
              sys.exit(1)

          failed = []
          for target, threshold in thresholds.items():
              cov = found[target]
              print(f"{target}: {cov:.2f}% (required {threshold:.1f}%)")
              if cov < threshold:
                  failed.append((target, cov, threshold))

          if failed:
              for target, cov, threshold in failed:
                  print(f"FAIL: {target}={cov:.2f}% < {threshold:.1f}%")
              sys.exit(1)
          PY
