name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify release version
        run: |
          python tools/release/check_release_version.py \
            --tag "${GITHUB_REF_NAME}" \
            --require-tag \
            --check-pypi

      - name: Release readiness gates
        run: |
          python tools/release/check_repository_size_manifest.py
          python tools/release/check_release_artifact_manifest.py
          python tools/release/check_package_architecture_manifest.py
          python tools/release/check_performance_optimization_manifest.py
          python tools/check_parallel_scaling_artifacts.py
          python tools/check_quasilinear_promotion_guardrails.py \
            --out-json /tmp/quasilinear_promotion_guardrails.json
          python tools/check_vmec_boozer_differentiability_claim.py \
            --out-json docs/_static/vmec_boozer_differentiability_claim_guard.json
          python tools/build_parallelization_completion_status.py \
            --out-prefix /tmp/parallelization_completion_status \
            --skip-figures
          python tools/build_technical_release_status.py \
            --out-json /tmp/technical_release_status.json \
            --fail-under 98
          python tools/release/check_release_readiness.py \
            --out-json /tmp/release_readiness.json

      - name: Build artifacts (sdist + wheel)
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Check distribution metadata
        run: |
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
