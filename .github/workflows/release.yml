name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify release version
        run: |
          python tools/release/check_release_readiness.py version \
            --tag "${GITHUB_REF_NAME}" \
            --require-tag \
            --check-pypi

      - name: Release readiness gates
        run: |
          python tools/release/check_repository_size_manifest.py
          python tools/release/check_repository_size_manifest.py release-artifacts
          python tools/release/check_package_architecture_manifest.py
          python tools/release/check_parallel_scaling_artifacts.py --performance-manifest-only
          python tools/release/check_parallel_scaling_artifacts.py
          python tools/release/check_quasilinear_promotion_guardrails.py \
            --out-json /tmp/quasilinear_promotion_guardrails.json
          python tools/release/check_vmec_boozer_gates.py differentiability-claim \
            --out-json docs/_static/vmec_boozer_differentiability_claim_guard.json
          python tools/release/check_release_readiness.py technical-status \
            --out-json /tmp/technical_release_status.json \
            --fail-under 98
          python tools/release/check_release_readiness.py \
            --out-json /tmp/release_readiness.json

      - name: Build artifacts (sdist + wheel)
        run: |
          python -m pip install --upgrade pip build twine
          rm -rf build dist
          python -m build

      - name: Check distribution metadata
        run: |
          twine check dist/*

      - name: Smoke-test installed wheel
        run: |
          python -m venv /tmp/gkx-wheel-smoke
          /tmp/gkx-wheel-smoke/bin/pip install dist/*.whl
          cd /tmp
          /tmp/gkx-wheel-smoke/bin/python - <<'PY'
          import gkx
          import gkx.parallel
          from importlib.util import find_spec
          from gkx.cli import build_parser

          assert "--plot" in build_parser().format_help()
          assert "batch_map" in gkx.parallel.__all__
          assert gkx.parallel.batch_map.__module__ == "gkx.parallel.batch"
          assert find_spec("gkx.objectives.qa_low_turbulence_contracts") is None
          assert find_spec("gkx.objectives.qa_low_turbulence_residuals") is None
          assert find_spec("gkx.objectives.stellarator_residuals") is None
          assert find_spec("gkx.diagnostics.growth_series") is None
          assert find_spec("gkx.geometry.vmec_boundary_collection") is None
          print(gkx.__version__)
          PY
          /tmp/gkx-wheel-smoke/bin/gkx --help >/dev/null
          /tmp/gkx-wheel-smoke/bin/gkx --help >/dev/null

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
