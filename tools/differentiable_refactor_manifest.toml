[metadata]
schema_version = 1
title = "Differentiable architecture refactor plan"
owner_lane = "research-grade differentiable SPECTRAX-GK architecture"
status = "planned"
created = "2026-06-14"
compatibility_policy = "public behavior and numerical parity must be preserved behind compatibility facades"
max_public_module_lines_target = 800
max_internal_module_lines_target = 1200

[global_acceptance]
required_package_coverage_percent = 95.0
max_fast_test_budget_seconds = 300
require_public_api_facades = true
require_reference_adapter_isolation = true
require_jax_transform_contracts = true
require_docstring_policy = true

[validation_policy]
parity_reference_scope = "GX and other independent-code artifacts are validation inputs only; solver code must not depend on comparison adapters."
literature_gate_scope = "Cyclone, shaped tokamak, W7-X/HSX, KBM/TEM/ETG, Rosenbluth-Hinton/Merlo, and quasilinear/nonlinear transport gates stay artifact-backed."
autodiff_gate_scope = "Finite-difference, JVP/VJP, branch-locality, conditioning, and UQ covariance checks are required before differentiable claims are promoted."
performance_gate_scope = "No speedup claim without identity gates, profiler artifacts, and matched CPU/GPU measurements."

[[architecture_layers]]
name = "core"
responsibility = "array typing, pytrees, precision policy, units, normalization, static/dynamic argument helpers"
planned_packages = ["spectraxgk.core"]
extension_points = ["PyTree containers", "dtype/precision policy", "normalization contracts"]

[[architecture_layers]]
name = "basis"
responsibility = "orthogonal velocity-space bases and recurrence rules"
planned_packages = ["spectraxgk.basis"]
extension_points = ["BasisFamily", "HermiteLaguerreBasis", "OrthaxBasisAdapter", "custom basis recurrence tests"]

[[architecture_layers]]
name = "geometry"
responsibility = "analytic, VMEC, vmec_jax, booz_xform_jax, and sampled flux-tube geometry providers"
planned_packages = ["spectraxgk.geometry", "spectraxgk.geometry.backends"]
extension_points = ["GeometryProvider", "FieldLineSampler", "BoozerTransformProvider", "GeometryParityReport"]

[[architecture_layers]]
name = "physics"
responsibility = "species, fields, closures, collision models, drives, and model configuration"
planned_packages = ["spectraxgk.physics"]
extension_points = ["SpeciesModel", "CollisionOperator", "ClosureModel", "FieldSolveModel"]

[[architecture_layers]]
name = "operators"
responsibility = "pure linear and nonlinear RHS kernels with explicit caches and field solves"
planned_packages = ["spectraxgk.operators"]
extension_points = ["LinearTerm", "NonlinearBracket", "FieldSolver", "RHSAssembly"]

[[architecture_layers]]
name = "solvers"
responsibility = "linear eigen/time solvers, nonlinear integrators, adjoints, checkpoint policies, and objective solvers"
planned_packages = ["spectraxgk.solvers"]
extension_points = ["TimeStepper", "EigenSolver", "AdjointPolicy", "ObjectiveSolver"]

[[architecture_layers]]
name = "diagnostics"
responsibility = "growth/frequency, transport, spectra, windows, UQ, and artifact schemas"
planned_packages = ["spectraxgk.diagnostics"]
extension_points = ["Diagnostic", "TransportWindow", "SpectrumExtractor", "GateReport"]

[[architecture_layers]]
name = "validation"
responsibility = "literature gates, reference-code comparison adapters, manifests, and benchmark families"
planned_packages = ["spectraxgk.validation"]
extension_points = ["BenchmarkFamily", "ReferenceAdapter", "PhysicsGate", "ArtifactLedger"]

[[architecture_layers]]
name = "workflows"
responsibility = "runtime, scans, optimization scripts, plotting, CLI command plumbing, and provenance"
planned_packages = ["spectraxgk.workflows", "spectraxgk.cli"]
extension_points = ["RuntimeWorkflow", "OptimizationWorkflow", "PlotWorkflow", "ProgressReporter"]

