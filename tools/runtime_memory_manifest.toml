[[run]]
case = "cyclone-linear"
label = "Cyclone ITG Linear"
backend = "spectrax_cpu"
command = "JAX_PLATFORM_NAME=cpu python examples/cyclone_runtime_linear.py --ky 0.3 --Nl 24 --Nm 12 --solver auto"
cwd = "{root}"

[[run]]
case = "cyclone-linear"
label = "Cyclone ITG Linear"
backend = "spectrax_gpu"
command = "JAX_PLATFORM_NAME=gpu python examples/cyclone_runtime_linear.py --ky 0.3 --Nl 24 --Nm 12 --solver auto"
cwd = "{root}"
enabled = false

[[run]]
case = "cyclone-linear"
label = "Cyclone ITG Linear"
backend = "gx"
command = "${GX_CYCLONE_LINEAR_CMD}"
cwd = "{root}"
enabled = false
wrap_time = false

