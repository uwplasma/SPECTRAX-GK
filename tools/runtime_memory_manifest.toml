[[run]]
case = "cyclone-linear"
label = "Cyclone ITG Linear"
backend = "spectrax_cpu"
host = "office"
command = "PATH=${SPECTRAX_VENV_BIN}:$PATH PYTHONPATH=src JAX_PLATFORM_NAME=cpu python examples/linear/axisymmetric/cyclone_runtime_linear.py --ky 0.3 --Nl 24 --Nm 12 --solver auto"
cwd = "${SPECTRAX_BENCH_ROOT}"

[[run]]
case = "cyclone-linear"
label = "Cyclone ITG Linear"
backend = "spectrax_gpu"
host = "office"
command = "PATH=${SPECTRAX_VENV_BIN}:$PATH PYTHONPATH=src CUDA_VISIBLE_DEVICES=${SPECTRAX_BENCH_CUDA_DEVICE} JAX_PLATFORM_NAME=gpu python examples/linear/axisymmetric/cyclone_runtime_linear.py --ky 0.3 --Nl 24 --Nm 12 --solver auto"
cwd = "${SPECTRAX_BENCH_ROOT}"

[[run]]
case = "cyclone-linear"
label = "Cyclone ITG Linear"
backend = "gx"
host = "office"
command = "tmpdir=$(mktemp -d) && trap 'rm -rf \"$tmpdir\"' EXIT && for f in *; do case \"$f\" in *.out.nc|*.restart.nc|*.big.nc|*.bin|rhs_terms_shape.txt) ;; *) ln -s \"$(pwd)/$f\" \"$tmpdir/$f\" ;; esac; done && cd \"$tmpdir\" && CUDA_VISIBLE_DEVICES=${SPECTRAX_BENCH_CUDA_DEVICE} env -u DISPLAY HDF5_DISABLE_VERSION_CHECK=1 LD_LIBRARY_PATH=${REFERENCE_GK_LD_LIBRARY_PATH}:$LD_LIBRARY_PATH ${REFERENCE_GK_BIN} itg_salpha_adiabatic_electrons.in"
cwd = "${REFERENCE_GK_REPO}/benchmarks/linear/ITG_cyclone"

