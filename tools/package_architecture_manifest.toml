[metadata]
schema_version = 1
title = "Package architecture policy"
layout_authority = "README.md"
status = "active"

[root_prefix_policy]
blocked_prefixes = [
  "runtime_",
  "nonlinear_",
  "linear_",
  "solver_",
  "vmex_",
  "quasilinear_",
  "benchmark_",
  "stellarator_",
]
allowed_root_prefix_modules = []

[package_policy]
required_domain_packages = [
  "gkx.artifacts",
  "gkx.core",
  "gkx.diagnostics",
  "gkx.geometry",
  "gkx.objectives",
  "gkx.operators",
  "gkx.operators.linear",
  "gkx.operators.nonlinear",
  "gkx.parallel",
  "gkx.solvers",
  "gkx.solvers.linear",
  "gkx.solvers.nonlinear",
  "gkx.solvers.time",
  "gkx.workflows",
  "gkx.workflows.runtime",
]
required_docs = [
  "README.md",
]
target_domain_packages = [
  "gkx.physics",
  "gkx.geometry",
  "gkx.numerics",
  "gkx.solve",
  "gkx.optimize",
  "gkx.io",
]

[topology_policy]
mode = "no_regression_until_target"
description = "Track the consolidation plan without breaking current CI before files are moved. Counts must not increase beyond the audited baseline; final release can pass --require-topology-targets to enforce the target ceilings."

[[topology_policy.counts]]
name = "installable_source_python_files"
path = "src/gkx"
pattern = "*.py"
recursive = true
baseline = 220
target = 45

[[topology_policy.counts]]
name = "test_python_files"
path = "tests"
pattern = "*.py"
recursive = true
baseline = 95
target = 36

[[topology_policy.counts]]
name = "tool_python_files"
path = "tools"
pattern = "*.py"
recursive = true
baseline = 95
target = 0

[[topology_policy.counts]]
name = "developer_script_python_files"
path = "scripts"
pattern = "*.py"
recursive = true
baseline = 15
target = 12


[[topology_policy.counts]]
name = "flat_test_python_files"
path = "tests"
pattern = "*.py"
recursive = false
baseline = 1
target = 1

[[topology_policy.counts]]
name = "flat_tool_python_files"
path = "tools"
pattern = "*.py"
recursive = false
baseline = 0
target = 0

[complexity_policy]
mode = "no_regression_until_target"
description = "Prevent new giant modules while named legacy hotspots are reduced to reviewed domain budgets."
default_max_lines = 1000
public_facade_max_lines = 500
public_facades = [
  "api/__init__.py",
  "benchmarks.py",
  "linear.py",
  "nonlinear.py",
  "quasilinear.py",
  "runtime.py",
]

[[complexity_policy.exceptions]]
path = "artifacts/nonlinear_netcdf.py"
baseline_lines = 1069
target_lines = 1000
reason = "One NetCDF schema owner keeps dimensions, geometry, diagnostics, restart, and final-field variables consistent; reduce helper repetition without splitting the schema again."

[[complexity_policy.exceptions]]
path = "artifacts/io.py"
baseline_lines = 1088
target_lines = 1000
reason = "One runtime I/O owner keeps summaries, tables, restart packing, and diagnostic reload consistent; reduce repeated serializers without restoring format-specific modules."

[line_budget_policy]
mode = "no_regression_until_target"
description = "Track real code deletion rather than file reshuffling."

[[line_budget_policy.counts]]
name = "installable_source_python_lines"
path = "src/gkx"
pattern = "*.py"
recursive = true
baseline = 87847
target = 45000

[[line_budget_policy.counts]]
name = "test_python_lines"
path = "tests"
pattern = "*.py"
recursive = true
baseline = 96202
target = 55000

[[line_budget_policy.counts]]
name = "tool_python_lines"
path = "tools"
pattern = "*.py"
recursive = true
baseline = 97346
target = 0

[[line_budget_policy.counts]]
name = "developer_script_python_lines"
path = "scripts"
pattern = "*.py"
recursive = true
baseline = 25000
target = 18000
