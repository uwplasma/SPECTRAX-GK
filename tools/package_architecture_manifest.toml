[metadata]
schema_version = 1
title = "Package architecture policy"
layout_authority = "docs/architecture_refactor_plan.rst"
status = "active"

[root_prefix_policy]
blocked_prefixes = [
  "runtime_",
  "nonlinear_",
  "linear_",
  "solver_",
  "vmec_jax_",
  "quasilinear_",
  "benchmark_",
  "stellarator_",
]
allowed_root_prefix_modules = []

[package_policy]
required_domain_packages = [
  "spectraxgk.artifacts",
  "spectraxgk.core",
  "spectraxgk.diagnostics",
  "spectraxgk.geometry",
  "spectraxgk.objectives",
  "spectraxgk.operators",
  "spectraxgk.operators.linear",
  "spectraxgk.operators.nonlinear",
  "spectraxgk.parallel",
  "spectraxgk.solvers",
  "spectraxgk.solvers.linear",
  "spectraxgk.solvers.nonlinear",
  "spectraxgk.solvers.time",
  "spectraxgk.workflows",
  "spectraxgk.workflows.runtime",
]
required_docs = [
  "docs/architecture_refactor_plan.rst",
  "docs/code_structure.rst",
  "docs/differentiable_refactor_plan.rst",
]

[topology_policy]
mode = "no_regression_until_target"
description = "Track the consolidation plan without breaking current CI before files are moved. Counts must not increase beyond the audited baseline; final release can pass --require-topology-targets to enforce the target ceilings."

[[topology_policy.counts]]
name = "installable_source_python_files"
path = "src/spectraxgk"
pattern = "*.py"
recursive = true
baseline = 227
target = 227

[[topology_policy.counts]]
name = "test_python_files"
path = "tests"
pattern = "*.py"
recursive = true
baseline = 98
target = 98

[[topology_policy.counts]]
name = "tool_python_files"
path = "tools"
pattern = "*.py"
recursive = true
baseline = 134
target = 134


[[topology_policy.counts]]
name = "flat_test_python_files"
path = "tests"
pattern = "*.py"
recursive = false
baseline = 1
target = 1

[[topology_policy.counts]]
name = "flat_tool_python_files"
path = "tools"
pattern = "*.py"
recursive = false
baseline = 0
target = 0

[complexity_policy]
mode = "no_regression_until_target"
description = "Prevent new giant modules while named legacy hotspots are reduced to reviewed domain budgets."
default_max_lines = 1000
public_facade_max_lines = 500
public_facades = [
  "api/__init__.py",
  "benchmarks.py",
  "linear.py",
  "nonlinear.py",
  "quasilinear.py",
  "runtime.py",
]

[[complexity_policy.exceptions]]
path = "geometry/imported_vmec.py"
baseline_lines = 2540
target_lines = 1000
reason = "split file parsing, convention mapping, and backend execution behind one geometry facade"

[[complexity_policy.exceptions]]
path = "diagnostics/nonlinear_gradient_evidence.py"
baseline_lines = 2371
target_lines = 1000
reason = "move campaign/report assembly out of installed diagnostics"

[[complexity_policy.exceptions]]
path = "diagnostics/validation_gates.py"
baseline_lines = 1418
target_lines = 1000
reason = "consolidate common gate algebra and move case policy to validation drivers"

[[complexity_policy.exceptions]]
path = "diagnostics/transport_windows.py"
baseline_lines = 1237
target_lines = 1000
reason = "separate reusable window statistics from artifact policy"

[[complexity_policy.exceptions]]
path = "geometry/imported_miller.py"
baseline_lines = 1173
target_lines = 1000
reason = "share imported-geometry parsing and normalization kernels"

[[complexity_policy.exceptions]]
path = "diagnostics/nonlinear_transport_optimization.py"
baseline_lines = 1020
target_lines = 1000
reason = "move campaign-specific admission policy out of installed diagnostics"
