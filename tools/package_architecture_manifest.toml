[metadata]
schema_version = 1
title = "Package architecture policy"
layout_authority = "docs/architecture_refactor_plan.rst"
status = "active"

[root_prefix_policy]
blocked_prefixes = [
  "runtime_",
  "nonlinear_",
  "linear_",
  "solver_",
  "vmec_jax_",
  "quasilinear_",
  "benchmark_",
  "stellarator_",
]
allowed_root_prefix_modules = [
  "spectraxgk.nonlinear_diagnostics",
  "spectraxgk.nonlinear_helpers",
  "spectraxgk.nonlinear_output_netcdf",
  "spectraxgk.nonlinear_parallel",
  "spectraxgk.nonlinear_parallel_contracts",
  "spectraxgk.nonlinear_replicate_diagnostics",
  "spectraxgk.nonlinear_replicate_followup",
  "spectraxgk.nonlinear_transport_optimization",
  "spectraxgk.quasilinear_calibration",
  "spectraxgk.quasilinear_holdout_admission",
  "spectraxgk.quasilinear_model_selection",
  "spectraxgk.quasilinear_window",
  "spectraxgk.runtime_artifacts",
  "spectraxgk.runtime_config",
  "spectraxgk.solver_objective_gradients",
  "spectraxgk.stellarator_objective_portfolio",
  "spectraxgk.stellarator_optimization",
  "spectraxgk.vmec_jax_boundary_chain",
  "spectraxgk.vmec_jax_candidate_gate",
  "spectraxgk.vmec_jax_transport_admission",
  "spectraxgk.vmec_jax_transport_gradient",
  "spectraxgk.vmec_jax_transport_line_search",
  "spectraxgk.vmec_jax_transport_objective",
]

[package_policy]
required_domain_packages = [
  "spectraxgk.artifacts",
  "spectraxgk.core",
  "spectraxgk.geometry",
  "spectraxgk.objectives",
  "spectraxgk.operators",
  "spectraxgk.operators.linear",
  "spectraxgk.operators.nonlinear",
  "spectraxgk.solvers",
  "spectraxgk.solvers.linear",
  "spectraxgk.validation",
  "spectraxgk.validation.benchmarks",
  "spectraxgk.validation.nonlinear_gradient",
  "spectraxgk.workflows",
  "spectraxgk.workflows.runtime",
]
required_docs = [
  "docs/architecture_refactor_plan.rst",
  "docs/code_structure.rst",
  "docs/differentiable_refactor_plan.rst",
]
