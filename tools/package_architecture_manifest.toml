[metadata]
schema_version = 1
title = "Package architecture policy"
layout_authority = "plan.md"
status = "active"

[root_prefix_policy]
blocked_prefixes = [
  "runtime_",
  "nonlinear_",
  "linear_",
  "solver_",
  "vmec_jax_",
  "quasilinear_",
  "benchmark_",
  "stellarator_",
]
allowed_root_prefix_modules = []

[package_policy]
required_domain_packages = [
  "spectraxgk.artifacts",
  "spectraxgk.core",
  "spectraxgk.diagnostics",
  "spectraxgk.geometry",
  "spectraxgk.objectives",
  "spectraxgk.operators",
  "spectraxgk.operators.linear",
  "spectraxgk.operators.nonlinear",
  "spectraxgk.parallel",
  "spectraxgk.solvers",
  "spectraxgk.solvers.linear",
  "spectraxgk.solvers.nonlinear",
  "spectraxgk.solvers.time",
  "spectraxgk.workflows",
  "spectraxgk.workflows.runtime",
]
required_docs = [
  "plan.md",
]
target_domain_packages = [
  "gkx.model",
  "gkx.geometry",
  "gkx.numerics",
  "gkx.solve",
  "gkx.diagnostics",
  "gkx.optimize",
  "gkx.io",
]

[topology_policy]
mode = "no_regression_until_target"
description = "Track the consolidation plan without breaking current CI before files are moved. Counts must not increase beyond the audited baseline; final release can pass --require-topology-targets to enforce the target ceilings."

[[topology_policy.counts]]
name = "installable_source_python_files"
path = "src/spectraxgk"
pattern = "*.py"
recursive = true
baseline = 220
target = 70

[[topology_policy.counts]]
name = "test_python_files"
path = "tests"
pattern = "*.py"
recursive = true
baseline = 95
target = 45

[[topology_policy.counts]]
name = "tool_python_files"
path = "tools"
pattern = "*.py"
recursive = true
baseline = 95
target = 0

[[topology_policy.counts]]
name = "developer_script_python_files"
path = "scripts"
pattern = "*.py"
recursive = true
baseline = 15
target = 15


[[topology_policy.counts]]
name = "flat_test_python_files"
path = "tests"
pattern = "*.py"
recursive = false
baseline = 1
target = 1

[[topology_policy.counts]]
name = "flat_tool_python_files"
path = "tools"
pattern = "*.py"
recursive = false
baseline = 0
target = 0

[complexity_policy]
mode = "no_regression_until_target"
description = "Prevent new giant modules while named legacy hotspots are reduced to reviewed domain budgets."
default_max_lines = 1000
public_facade_max_lines = 500
public_facades = [
  "api/__init__.py",
  "benchmarks.py",
  "linear.py",
  "nonlinear.py",
  "quasilinear.py",
  "runtime.py",
]
exceptions = []

[line_budget_policy]
mode = "no_regression_until_target"
description = "Track real code deletion rather than file reshuffling."

[[line_budget_policy.counts]]
name = "installable_source_python_lines"
path = "src/spectraxgk"
pattern = "*.py"
recursive = true
baseline = 87847
target = 50000

[[line_budget_policy.counts]]
name = "test_python_lines"
path = "tests"
pattern = "*.py"
recursive = true
baseline = 96202
target = 60000

[[line_budget_policy.counts]]
name = "tool_python_lines"
path = "tools"
pattern = "*.py"
recursive = true
baseline = 97346
target = 0

[[line_budget_policy.counts]]
name = "developer_script_python_lines"
path = "scripts"
pattern = "*.py"
recursive = true
baseline = 25000
target = 25000
