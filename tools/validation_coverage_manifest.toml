[metadata]
schema_version = 1
package_coverage_target_percent = 95.0
default_test_budget_seconds = 300
wide_coverage_ci_job = "wide-coverage"
branch = "refactor/modularize-core-for-validation"

[[modules]]
module = "spectraxgk.runtime"
path = "src/spectraxgk/runtime.py"
owner_lane = "runtime orchestration, executable behavior, restart/output contracts"
status = "active"
coverage_priority = "high"
coverage_target_percent = 95.0
reference_anchors = [
  "GX-style runtime diagnostics and exact-state parity audits",
  "Cyclone Base Case and W7-X/HSX runtime artifact regressions",
]
physics_contracts = [
  "runtime inputs preserve configured geometry, species, fields, and diagnostics",
  "restart continuation preserves final samples and signed zonal diagnostics",
]
numerics_contracts = [
  "adaptive and fixed-step time paths report equivalent sampled diagnostics within gate tolerances",
  "nonfinite diagnostic chunks abort artifact generation instead of silently writing corrupt panels",
]
fast_tests = [
  "tests/test_runtime_config.py",
  "tests/test_runtime_helpers.py",
  "tests/test_runtime_runner.py",
  "tests/test_runtime_artifacts.py",
  "tests/test_restart.py",
]
artifact_paths = [
  "docs/_static/validation_gate_index.json",
  "docs/_static/w7x_exact_state_audit.json",
]
next_tests = [
  "split remaining runtime orchestration helpers behind compatibility exports",
  "add branch coverage for fixed_dt/adaptive/restart output handoff paths",
]

