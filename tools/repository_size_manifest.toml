[policy]
# Current tracked docs previews and validation artifacts sit near 40 MB after
# the lightweight preview trim. Keep a buffer while the separate
# release-artifact migration lane moves more high-resolution companions out of
# Git.
max_tracked_total_bytes = 50000000
max_unlisted_tracked_file_bytes = 1000000

[[allowed_large_files]]
path = "examples/wout_HSX_QHS_vacuum_ns201.nc"
max_bytes = 4500000
reason = "Small checked-in HSX VMEC fixture used by non-axisymmetric geometry examples and tests."
release_destination = "keep-in-repo-fixture"

[[allowed_large_files]]
path = "docs/_static/benchmark_readme_panel.pdf"
max_bytes = 1200000
reason = "High-resolution README panel companion retained until release-artifact move."
release_destination = "planned-github-release-highres"
