[policy]
max_tracked_total_bytes = 45000000
max_unlisted_tracked_file_bytes = 1000000

[[allowed_large_files]]
path = "examples/wout_HSX_QHS_vacuum_ns201.nc"
max_bytes = 4500000
reason = "Small checked-in HSX VMEC fixture used by non-axisymmetric geometry examples and tests."
release_destination = "keep-in-repo-fixture"

[[allowed_large_files]]
path = "docs/_static/benchmark_readme_panel.png"
max_bytes = 3600000
reason = "README benchmark preview retained until release-artifact previews are split from high-resolution figures."
release_destination = "planned-github-release-preview-trim"

