# Template manifest for tools/run_exact_state_audit.py
#
# Copy this file, fill in the paths for your machine, and then run:
#   python tools/run_exact_state_audit.py --manifest /path/to/your_lanes.toml
#
# Each lane table is optional-feature driven:
# - [lane.<name>.startup] requires GX field dump binaries (startup dump)
# - [lane.<name>.diag_state] requires GX diag_state dump binaries
# - [lane.<name>.window] requires GX diag_state dump binaries for two time indices
#
# These artifacts are typically produced by GX runs on `office` with additional
# dump flags enabled (no GX physics changes required).

[lane.cyclone_miller]
config = "examples/configs/runtime_cyclone_nonlinear_gx_miller.toml"
gx_out = "/ABS/PATH/TO/GX/itg_miller_adiabatic_electrons_correct.out.nc"

[lane.cyclone_miller.startup]
gx_dir = "/ABS/PATH/TO/GX/field_dumps_startup"
ky = 0.3
kx_target = 0.0

[lane.cyclone_miller.diag_state]
gx_dir = "/ABS/PATH/TO/GX/diag_state_dumps"
time_index = 10

[lane.cyclone_miller.window]
gx_dir = "/ABS/PATH/TO/GX/diag_state_dumps"
time_index_start = 10
time_index_stop = 11
ky = 0.3

