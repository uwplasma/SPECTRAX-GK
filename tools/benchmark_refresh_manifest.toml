[[job]]
name = "cyclone-core-assets"
description = "Regenerate the tracked Cyclone tables and figures."
cwd = "{root}"
command = "PYTHONPATH=src python tools/make_tables.py --case cyclone --no-progress && PYTHONPATH=src python tools/make_figures.py --case cyclone --no-progress"
outputs = [
  "docs/_static/cyclone_mismatch_table.csv",
  "docs/_static/cyclone_comparison.png",
  "docs/_static/cyclone_reference.png",
]

[[job]]
name = "etg-core-assets"
description = "Regenerate the tracked ETG tables and baseline figures."
cwd = "{root}"
command = "PYTHONPATH=src python tools/make_tables.py --case etg --no-progress && PYTHONPATH=src python tools/make_figures.py --case etg --no-progress"
outputs = [
  "docs/_static/etg_mismatch_table.csv",
  "docs/_static/etg_comparison.png",
  "docs/_static/etg_trend_table.csv",
]

[[job]]
name = "etg-gs2"
description = "Refresh ETG GS2 mismatch rows from clean GS2 outputs."
cwd = "{root}"
requires_env = ["GS2_ETG_ARGS"]
command = "PYTHONPATH=src python tools/compare_gs2_linear.py --case etg ${GS2_ETG_ARGS} --out-csv docs/_static/etg_gs2_mismatch.csv"
outputs = ["docs/_static/etg_gs2_mismatch.csv"]

[[job]]
name = "etg-stella"
description = "Refresh ETG stella mismatch rows from clean stella outputs."
cwd = "{root}"
requires_env = ["STELLA_ETG_ARGS"]
command = "PYTHONPATH=src python tools/compare_stella_linear.py --case etg ${STELLA_ETG_ARGS} --out-csv docs/_static/etg_stella_mismatch.csv"
outputs = ["docs/_static/etg_stella_mismatch.csv"]

[[job]]
name = "etg-crosscode-plot"
description = "Regenerate the ETG GS2/stella overlay figure."
cwd = "{root}"
command = "python tools/plot_etg_crosscode.py --gs2-csv docs/_static/etg_gs2_mismatch.csv --stella-csv docs/_static/etg_stella_mismatch.csv --out docs/_static/etg_gs2_stella_comparison.png"
outputs = ["docs/_static/etg_gs2_stella_comparison.png"]

[[job]]
name = "kbm-crosscode"
description = "Refresh KBM GS2/stella mismatch tables from clean external outputs."
cwd = "{root}"
requires_env = ["KBM_GS2_ARGS", "KBM_STELLA_ARGS"]
command = "PYTHONPATH=src python tools/compare_kbm_crosscode.py ${KBM_GS2_ARGS} ${KBM_STELLA_ARGS} --out-gs2-csv docs/_static/kbm_gs2_mismatch.csv --out-stella-csv docs/_static/kbm_stella_mismatch.csv"
outputs = [
  "docs/_static/kbm_gs2_mismatch.csv",
  "docs/_static/kbm_stella_mismatch.csv",
]

[[job]]
name = "kbm-crosscode-plot"
description = "Regenerate the KBM GS2/stella overlay figure."
cwd = "{root}"
command = "python tools/plot_kbm_crosscode.py --gs2-csv docs/_static/kbm_gs2_mismatch.csv --stella-csv docs/_static/kbm_stella_mismatch.csv --out docs/_static/kbm_gs2_stella_comparison.png"
outputs = ["docs/_static/kbm_gs2_stella_comparison.png"]

[[job]]
name = "imported-linear-w7x"
description = "Refresh the W7-X imported linear scan from clean GX outputs."
cwd = "{root}"
requires_env = ["W7X_IMPORTED_ARGS"]
command = "PYTHONPATH=src python tools/compare_gx_imported_linear.py ${W7X_IMPORTED_ARGS} --out docs/_static/w7x_linear_t2_scan.csv"
outputs = ["docs/_static/w7x_linear_t2_scan.csv"]

[[job]]
name = "imported-linear-hsx"
description = "Refresh the HSX imported linear scan from clean GX outputs."
cwd = "{root}"
requires_env = ["HSX_IMPORTED_ARGS"]
command = "PYTHONPATH=src python tools/compare_gx_imported_linear.py ${HSX_IMPORTED_ARGS} --out docs/_static/hsx_linear_t2_scan.csv"
outputs = ["docs/_static/hsx_linear_t2_scan.csv"]

[[job]]
name = "imported-linear-cyclone-miller"
description = "Refresh the Cyclone Miller imported linear scan from clean GX outputs."
cwd = "{root}"
requires_env = ["CYCLONE_MILLER_IMPORTED_ARGS"]
command = "PYTHONPATH=src python tools/compare_gx_imported_linear.py ${CYCLONE_MILLER_IMPORTED_ARGS} --out docs/_static/cyclone_miller_linear_mismatch.csv"
outputs = ["docs/_static/cyclone_miller_linear_mismatch.csv"]

[[job]]
name = "kaw-exact-growth"
description = "Refresh the KAW exact late growth diagnostic from clean same-run dumps."
cwd = "{root}"
requires_env = ["KAW_GROWTH_ARGS"]
command = "PYTHONPATH=src:. python tools/compare_gx_imported_growth_dump.py ${KAW_GROWTH_ARGS} --out docs/_static/kaw_exact_growth_dump.csv"
outputs = ["docs/_static/kaw_exact_growth_dump.csv"]

[[job]]
name = "kbm-miller-exact-growth"
description = "Refresh the Miller KBM exact late growth diagnostic from clean same-trajectory dumps."
cwd = "{root}"
requires_env = ["KBM_MILLER_GROWTH_ARGS"]
command = "PYTHONPATH=src:. python tools/compare_gx_imported_growth_dump.py ${KBM_MILLER_GROWTH_ARGS} --out docs/_static/kbm_miller_exact_growth_dump.csv"
outputs = ["docs/_static/kbm_miller_exact_growth_dump.csv"]

[[job]]
name = "nonlinear-cyclone"
description = "Refresh the tracked nonlinear Cyclone diagnostic comparison figure."
cwd = "{root}"
requires_env = ["CYCLONE_NONLINEAR_ARGS"]
command = "python tools/compare_gx_nonlinear_diagnostics.py ${CYCLONE_NONLINEAR_ARGS} --out docs/_static/nonlinear_cyclone_miller_diag_compare_t122.png"
outputs = ["docs/_static/nonlinear_cyclone_miller_diag_compare_t122.png"]

[[job]]
name = "benchmark-atlas"
description = "Rebuild the README/docs benchmark atlas from the refreshed tracked assets."
cwd = "{root}"
command = "PYTHONPATH=src python tools/make_benchmark_atlas.py"
outputs = [
  "docs/_static/benchmark_imported_linear_panel.png",
  "docs/_static/benchmark_extended_linear_panel.png",
  "docs/_static/benchmark_core_linear_atlas.png",
  "docs/_static/benchmark_core_nonlinear_atlas.png",
  "docs/_static/benchmark_readme_panel.png",
]
